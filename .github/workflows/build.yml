name: Build Android APK

on:
  push:
    branches: [ main, master, codex/rebuild-prd-core ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-home-cache-disabled: true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: |
        echo "=== Java Version ==="
        java -version 2>&1 || true
        echo ""
        echo "=== Android SDK ==="
        echo "ANDROID_HOME: $ANDROID_HOME"
        ls -la $ANDROID_HOME 2>/dev/null || echo "SDK not found"
        echo ""
        echo "=== Building APK ==="
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        echo ""
        echo "=== Build log tail ==="
        tail -500 build.log
        echo ""
        echo "=== APK Output ==="
        find app/build/outputs/apk -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK dir not found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: btelo-coding-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-full
        path: |
          build.log
          app/build/
        retention-days: 7
