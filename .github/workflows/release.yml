name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Use official Gradle distribution
      run: sed -i 's|https://mirrors.cloud.tencent.com/gradle/|https://services.gradle.org/distributions/|' gradle/wrapper/gradle-wrapper.properties

    - name: Build Release APK
      run: ./gradlew assembleRelease
      env:
        BTELO_UPLOAD_KEYSTORE_BASE64: ${{ secrets.BTELO_UPLOAD_KEYSTORE_BASE64 }}
        BTELO_UPLOAD_STORE_PASSWORD: ${{ secrets.BTELO_UPLOAD_STORE_PASSWORD }}
        BTELO_UPLOAD_KEY_PASSWORD: ${{ secrets.BTELO_UPLOAD_KEY_PASSWORD }}
        BTELO_UPLOAD_KEY_ALIAS: ${{ secrets.BTELO_UPLOAD_KEY_ALIAS }}

    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Yami-Coding ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Yami-Coding Android ${{ steps.get_version.outputs.VERSION }}

          ### Install
          Open BTELO Coding on Android and tap **Check updates**. The app downloads this APK in-app and opens the Android installer.

          ### Notes
          - Signed with the configured BTELO upload key.
          - Android can only update over an existing install when the signing certificate matches.
          - If Android reports a signature mismatch, uninstall the old build once, then install this release build.
        files: |
          app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
