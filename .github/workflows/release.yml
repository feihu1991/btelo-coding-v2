name: Build and Release APK

on:
  push:
    branches:
      - codex/rebuild-prd-core
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)"
            TAG="v${VERSION}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -f "${TAG}" "${GITHUB_SHA}"
            git push -f origin "${TAG}"
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "TAG=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## Updates

            - Built from `${{ github.sha }}`
            - Source branch: `${{ github.ref_name }}`

            ## Download

            Download the APK asset below and install it on the phone.

            ## Install

            1. Download the APK.
            2. Allow installing from unknown sources if Android asks.
            3. Install and reopen the app.
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
